<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fff9f0">
<title>🐾 動物翻翻樂</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #fff9f0;
  --card-back:  #ff9800;
  --card-front: #ffffff;
  --card-done:  #e8f5e9;
  --card-brd:   #f0c080;
  --card-done-brd: #81c784;
  --card-sel:   #ffcc02;
  --text:       #5d4037;
  --text-sub:   #a1887f;
  --accent:     #ff9800;
  --accent2:    #ff5722;
  --green:      #43a047;
  --shadow:     rgba(0,0,0,0.12);
  --radius:     20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  padding-bottom: 32px;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 55% 35% at 15% 10%, #ffe0b2 0%, transparent 60%),
    radial-gradient(ellipse 45% 30% at 85% 85%, #fce4ec 0%, transparent 60%),
    radial-gradient(ellipse 40% 25% at 75% 15%, #f3e5f5 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 540px;
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 14px;
  gap: 14px;
}

/* ── HEADER ── */
.header {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  background: white;
  border-radius: 24px;
  padding: 13px 22px;
  box-shadow: 0 4px 16px var(--shadow);
  border: 2px solid #ffe0b2;
}
.title { font-size: 22px; font-weight: 900; color: var(--accent2); }
.title span { color: var(--text); }
.level-tag {
  font-size: 13px; font-weight: 900;
  background: #fff3e0; color: var(--accent);
  border: 2px solid #ffcc80;
  border-radius: 20px; padding: 4px 14px;
}

/* ── STATS ── */
.stats { display: flex; gap: 10px; width: 100%; }
.stat-card {
  flex: 1; background: white; border-radius: 16px;
  border: 2px solid #ffe0b2; padding: 10px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  box-shadow: 0 3px 10px var(--shadow);
}
.stat-label { font-size: 12px; color: var(--text-sub); font-weight: 700; }
.stat-value { font-size: 26px; font-weight: 900; color: var(--accent2); line-height: 1; }

/* ── HINT TEXT ── */
.hint-text {
  font-size: 18px; font-weight: 700;
  color: var(--text-sub);
  text-align: center; min-height: 28px;
  transition: color 0.2s;
  padding: 0 8px;
  line-height: 1.4;
}
.hint-text.good { color: var(--green); }
.hint-text.warn { color: #e53935; }

/* ── BOARD ── */
#board {
  display: grid;
  gap: 10px;
  justify-content: center;
}

/* ── CARD ── */
.card {
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  /* 3D flip setup */
  perspective: 600px;
}

.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.42s cubic-bezier(0.4,0,0.2,1);
  border-radius: var(--radius);
}

.card.flipped .card-inner,
.card.matched .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px var(--shadow);
}

/* BACK face */
.card-back {
  background: var(--card-back);
  border: 3px solid #ef6c00;
  font-size: 28px;
  /* subtle pattern */
  background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 50%);
}

/* decorative paw on back */
.card-back::after {
  content: '🐾';
  font-size: 32px;
  opacity: 0.35;
}

/* FRONT face */
.card-front {
  background: var(--card-front);
  border: 3px solid var(--card-brd);
  transform: rotateY(180deg);
  transition: background 0.3s, border-color 0.3s;
}

.card.matched .card-front {
  background: var(--card-done);
  border-color: var(--card-done-brd);
}

.card-emoji {
  font-size: 42px;
  line-height: 1;
  user-select: none;
  transition: transform 0.2s;
}

.card.matched .card-emoji {
  animation: matchBounce 0.5s ease;
}

@keyframes matchBounce {
  0%,100% { transform: scale(1); }
  40%      { transform: scale(1.35); }
  70%      { transform: scale(0.9); }
}

/* selected glow ring */
.card.flipped:not(.matched) .card-front {
  box-shadow: 0 0 0 4px var(--card-sel), 0 6px 20px rgba(255,152,0,0.3);
}

/* hover */
.card:not(.flipped):not(.matched):hover .card-back {
  filter: brightness(1.08);
  transform: translateY(-2px);
}
.card:not(.flipped):not(.matched):active .card-inner {
  transform: scale(0.94);
}

/* ── CONTROLS ── */
.controls { display: flex; gap: 10px; width: 100%; }
.btn {
  flex: 1;
  font-family: 'Nunito', sans-serif;
  font-size: 17px; font-weight: 900;
  padding: 15px 8px;
  border: 3px solid transparent;
  border-radius: 18px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 4px 12px var(--shadow);
}
.btn:active { transform: scale(0.96); }
.btn-reset { background: #fce4ec; color: #e91e63; border-color: #f48fb1; }
.btn-new   { background: #e3f2fd; color: #1976d2; border-color: #90caf9; }
.btn-harder{ background: #e8f5e9; color: var(--green); border-color: #a5d6a7; }

/* ── WIN OVERLAY ── */
#win-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,249,240,0.93);
  z-index: 100;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 0;
}
#win-overlay.show { display: flex; }

.win-box {
  background: white;
  border: 4px solid var(--accent);
  border-radius: 32px;
  padding: 36px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  box-shadow: 0 12px 48px rgba(255,152,0,0.22);
  animation: winPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  max-width: 320px; width: 90%;
}
@keyframes winPop {
  0%   { transform: scale(0.4) rotate(-6deg); opacity: 0; }
  100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
}
.win-emoji { font-size: 68px; line-height: 1; }
.win-title { font-size: 28px; font-weight: 900; color: var(--accent2); }
.win-sub   { font-size: 16px; color: var(--text-sub); font-weight: 700; text-align: center; line-height: 1.7; }
.win-score { font-size: 38px; font-weight: 900; color: var(--accent); }
.win-best  { font-size: 13px; color: var(--green); font-weight: 900; min-height: 20px; }

.win-btns  { display: flex; gap: 10px; margin-top: 4px; width: 100%; }
.win-btns .btn { font-size: 15px; padding: 12px 8px; }

/* ── PARTICLES ── */
.particle {
  position: fixed; font-size: 30px;
  pointer-events: none; z-index: 200;
  animation: burst 1.1s ease forwards;
}
@keyframes burst {
  0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0.1) rotate(var(--rot)); opacity: 0; }
}

/* ── RESPONSIVE ── */
@media (max-width: 380px) {
  :root { --radius: 14px; }
  .card-emoji { font-size: 32px; }
  .card-back::after { font-size: 24px; }
  .title { font-size: 18px; }
}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="title">🐾 動物<span>翻翻樂</span></div>
    <div class="level-tag" id="level-tag">初級 4×3</div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">翻牌次數</div>
      <div class="stat-value" id="stat-flips">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">配對成功</div>
      <div class="stat-value" id="stat-matched">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最佳紀錄</div>
      <div class="stat-value" id="stat-best">--</div>
    </div>
  </div>

  <p class="hint-text" id="hint">翻開牌，找出兩張相同的動物！</p>

  <div id="board"></div>

  <div class="controls">
    <button class="btn btn-reset"  id="btn-reset">↺ 重玩</button>
    <button class="btn btn-harder" id="btn-harder">⬆ 升級</button>
    <button class="btn btn-new"    id="btn-new">🎲 新局</button>
  </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
  <div class="win-box">
    <div class="win-emoji">🎉</div>
    <div class="win-title">好棒！過關了！</div>
    <div class="win-sub" id="win-sub">翻了</div>
    <div class="win-score" id="win-score">0 次</div>
    <div class="win-best"  id="win-best"></div>
    <div class="win-btns">
      <button class="btn btn-reset" id="win-replay">↺ 再玩</button>
      <button class="btn btn-harder" id="win-harder">⬆ 升級</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ANIMALS — visually distinct, easy to recognise
// ══════════════════════════════════════════════
const ANIMALS = ['🐶','🐱','🐭','🐰','🦊','🐻','🐼','🐨',
                 '🐯','🐸','🐵','🐔','🐧','🦆','🐺','🦁'];

// difficulty levels: [cols, rows]
const LEVELS = [
  { cols: 4, rows: 3, label: '初級 4×3' },
  { cols: 4, rows: 4, label: '中級 4×4' },
  { cols: 5, rows: 4, label: '進階 5×4' },
  { cols: 6, rows: 4, label: '高級 6×4' },
  { cols: 6, rows: 5, label: '挑戰 6×5' },
  { cols: 8, rows: 4, label: '達人 8×4' },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let levelIdx   = 0;
let cards      = [];   // [{id, emoji, flipped, matched}]
let flippedIds = [];   // at most 2
let flips      = 0;
let matched    = 0;
let pairs      = 0;
let locked     = false;
let initialCards = [];
let bests      = JSON.parse(localStorage.getItem('flipBests') || '{}');

// ══════════════════════════════════════════════
//  CARD SIZE — responsive
// ══════════════════════════════════════════════
function getCardSize(cols) {
  const maxW = Math.min(window.innerWidth, 540) - 28 - (cols - 1) * 10;
  const raw  = Math.floor(maxW / cols);
  return Math.min(Math.max(raw, 60), 88);
}

// ══════════════════════════════════════════════
//  NEW GAME
// ══════════════════════════════════════════════
function startGame(lv, keepLevel = false) {
  if (!keepLevel) levelIdx = lv;
  const { cols, rows, label } = LEVELS[levelIdx];
  pairs = (cols * rows) / 2;

  const pool = ANIMALS.slice(0, pairs);
  const doubled = [...pool, ...pool];
  // shuffle
  for (let i = doubled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [doubled[i], doubled[j]] = [doubled[j], doubled[i]];
  }

  cards = doubled.map((emoji, i) => ({ id: i, emoji, flipped: false, matched: false }));
  initialCards = cards.map(c => ({ ...c }));
  flippedIds = [];
  flips      = 0;
  matched    = 0;
  locked     = false;

  document.getElementById('level-tag').textContent = label;
  document.getElementById('win-overlay').classList.remove('show');
  updateStats();
  renderBoard(cols, rows);
  showHint('翻開牌，找出兩張相同的動物！');
}

function resetGame() {
  cards = initialCards.map(c => ({ ...c }));
  flippedIds = [];
  flips   = 0;
  matched = 0;
  locked  = false;
  const { cols, rows } = LEVELS[levelIdx];
  document.getElementById('win-overlay').classList.remove('show');
  updateStats();
  renderBoard(cols, rows);
  showHint('重新開始囉！加油！');
}

function harderGame() {
  if (levelIdx < LEVELS.length - 1) levelIdx++;
  startGame(levelIdx, true);
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderBoard(cols, rows) {
  const board = document.getElementById('board');
  const sz    = getCardSize(cols);
  board.style.gridTemplateColumns = `repeat(${cols}, ${sz}px)`;
  board.innerHTML = '';

  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card' +
      (card.flipped  ? ' flipped'  : '') +
      (card.matched  ? ' matched'  : '');
    el.style.width  = sz + 'px';
    el.style.height = sz + 'px';
    el.dataset.id   = card.id;

    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">
          <span class="card-emoji">${card.emoji}</span>
        </div>
      </div>`;

    el.addEventListener('click', () => onCardClick(card.id));
    board.appendChild(el);
  });
}

function getCardEl(id) {
  return document.querySelector(`.card[data-id="${id}"]`);
}

function updateStats() {
  document.getElementById('stat-flips').textContent   = flips;
  document.getElementById('stat-matched').textContent = matched;
  const key = String(levelIdx);
  document.getElementById('stat-best').textContent =
    bests[key] !== undefined ? bests[key] : '--';
}

function showHint(msg, type = '') {
  const el = document.getElementById('hint');
  el.textContent  = msg;
  el.className    = 'hint-text' + (type ? ' ' + type : '');
}

// ══════════════════════════════════════════════
//  INTERACTION
// ══════════════════════════════════════════════
function onCardClick(id) {
  if (locked) return;
  const card = cards[id];
  if (card.flipped || card.matched) return;
  if (flippedIds.includes(id)) return;

  // flip card
  card.flipped = true;
  flips++;
  updateStats();
  getCardEl(id).classList.add('flipped');

  flippedIds.push(id);

  if (flippedIds.length === 1) {
    showHint(`找到另一隻 ${card.emoji} 吧！`);
    return;
  }

  // second card flipped
  const [id1, id2] = flippedIds;
  const c1 = cards[id1], c2 = cards[id2];

  if (c1.emoji === c2.emoji) {
    // ✅ MATCH
    setTimeout(() => {
      c1.matched = c2.matched = true;
      getCardEl(id1).classList.add('matched');
      getCardEl(id2).classList.add('matched');
      matched++;
      flippedIds = [];
      updateStats();
      showHint(`配對成功！${c1.emoji} 找到朋友了！`, 'good');
      if (matched === pairs) setTimeout(onWin, 500);
    }, 300);

  } else {
    // ❌ NO MATCH — show both for 1.5s then flip back
    locked = true;
    showHint('不一樣，再試一次！', 'warn');
    setTimeout(() => {
      c1.flipped = c2.flipped = false;
      getCardEl(id1).classList.remove('flipped');
      getCardEl(id2).classList.remove('flipped');
      flippedIds = [];
      locked = false;
      showHint('翻開牌，找出兩張相同的動物！');
    }, 1500);   // 1.5s — long enough for elderly to see
  }
}

// ══════════════════════════════════════════════
//  WIN
// ══════════════════════════════════════════════
function onWin() {
  const key = String(levelIdx);
  const prev = bests[key];
  let isNewBest = false;
  if (!prev || flips < prev) {
    bests[key] = flips;
    localStorage.setItem('flipBests', JSON.stringify(bests));
    isNewBest = true;
  }

  const { label } = LEVELS[levelIdx];
  document.getElementById('win-sub').textContent   = `${label}，翻牌`;
  document.getElementById('win-score').textContent = `${flips} 次`;
  document.getElementById('win-best').textContent  =
    isNewBest ? '🌟 新紀錄！太厲害了！' : `最佳紀錄：${bests[key]} 次`;

  // hide harder btn if max level
  document.getElementById('win-harder').style.display =
    levelIdx < LEVELS.length - 1 ? '' : 'none';

  document.getElementById('win-overlay').classList.add('show');
  fireParticles();
}

function fireParticles() {
  const pool = ANIMALS.slice(0, pairs);
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className   = 'particle';
      p.textContent = pool[Math.floor(Math.random() * pool.length)];
      p.style.left  = (20 + Math.random() * 60) + 'vw';
      p.style.top   = (20 + Math.random() * 50) + 'vh';
      const angle   = Math.random() * 2 * Math.PI;
      const dist    = 80 + Math.random() * 220;
      p.style.setProperty('--dx',  Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', (Math.sin(angle) * dist - 120) + 'px');
      p.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1150);
    }, i * 35);
  }
}

// ══════════════════════════════════════════════
//  BUTTON EVENTS
// ══════════════════════════════════════════════
document.getElementById('btn-reset').addEventListener('click',  resetGame);
document.getElementById('btn-harder').addEventListener('click', harderGame);
document.getElementById('btn-new').addEventListener('click',    () => startGame(levelIdx, true));
document.getElementById('win-replay').addEventListener('click', resetGame);
document.getElementById('win-harder').addEventListener('click', harderGame);

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
startGame(0);
</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', {{ scope: './' }})
          .then(r => console.log('[PWA] SW registered:', r.scope))
          .catch(e => console.warn('[PWA] SW failed:', e));
      });
    }
  </script>
</body>
</html>
